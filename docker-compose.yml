services:
  auth_db:
    image: cerberus-db
    build:
      context: .
      dockerfile_inline: |
        FROM mysql:8.0
    container_name: auth_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "#########"
      MYSQL_DATABASE: auth
      MYSQL_USER: blendata
      MYSQL_PASSWORD: "#########"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p'#########'"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  auth_api:
    build:
      context: .
      args:
        - APP_NAME=cerberus
    container_name: auth_api
    image: cerberus-api
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db 
      MYSQL_USER: blendata
      MYSQL_PASSWORD: "#########"
      MYSQL_DATABASE: auth
    depends_on:
      auth_db:
        condition: service_healthy
  
  web_frontend:
    build:
      context: ./app/ui
    container_name: ui
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - CI=true
    stdin_open: true 
    tty: true

  web_backend:
    build:
      context: .
      args:
        - APP_NAME=hera
    image: hera
    container_name: hera
    ports:
      - "5001:5000"

  mlflow_db:
    image: postgres:15
    container_name: mlflow_db
    restart: always
    environment:
      POSTGRES_USER: blendata
      POSTGRES_PASSWORD: "#########"
      POSTGRES_DB: mlflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blendata -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build: .
    container_name: mlflow_server
    restart: always
    ports:
      - "5050:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://blendata:#########@mlflow_db:5432/mlflow
    command: >
      mlflow server 
      --backend-store-uri postgresql://blendata:#########@mlflow_db:5432/mlflow
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
      --default-artifact-root mlflow-artifacts:/
    depends_on:
      mlflow_db:
        condition: service_healthy

volumes:
  mysql_data:
  pg_data: